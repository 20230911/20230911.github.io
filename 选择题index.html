            // ---------- 以下为页面逻辑，无需修改 ----------
            let wrongSet = new Set(JSON.parse(localStorage.getItem('wrongSet') || '[]'));
            let currentIndex = parseInt(localStorage.getItem('currentIndex') || '0');
            let userAnswers = JSON.parse(localStorage.getItem('userAnswers') || '{}');

            const questionArea = document.getElementById('questionArea');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const progress = document.getElementById('progress');
            const wrongNote = document.getElementById('wrongNote');

            function renderQuestion() {
                const q = questions[currentIndex];
                progress.innerText = `第 ${currentIndex + 1} / ${questions.length} 题`;
                
                let html = `
                    <div class="question-box">
                        <div class="question-text">${q.id}. ${q.question}</div>
                        <div class="options" id="optionsContainer">
                `;
                
                q.options.forEach((opt, idx) => {
                    const letter = String.fromCharCode(65 + idx);
                    const isSelected = (userAnswers[q.id] === letter);
                    html += `
                        <div class="option ${isSelected ? 'selected' : ''}" data-option="${letter}" data-qid="${q.id}">
                            <span class="option-prefix">${letter}.</span> ${opt.substring(2)}
                        </div>
                    `;
                });
                
                html += `</div>`;
                
                if (userAnswers[q.id]) {
                    const isCorrect = (userAnswers[q.id] === q.answer);
                    html += `
                        <div class="explain-box">
                            <strong>${isCorrect ? '✅ 回答正确' : '❌ 回答错误'}</strong><br>
                            ${q.explain}
                        </div>
                    `;
                }
                
                html += `</div>`;
                questionArea.innerHTML = html;

                // 绑定选项点击事件
                document.querySelectorAll('.option').forEach(opt => {
                    opt.addEventListener('click', function(e) {
                        const qid = parseInt(this.dataset.qid);
                        const selected = this.dataset.option;
                        const question = questions.find(q => q.id === qid);
                        
                        userAnswers[qid] = selected;
                        localStorage.setItem('userAnswers', JSON.stringify(userAnswers));
                        
                        const isCorrect = (selected === question.answer);
                        if (!isCorrect) {
                            wrongSet.add(qid);
                        } else {
                            wrongSet.delete(qid);
                        }
                        localStorage.setItem('wrongSet', JSON.stringify([...wrongSet]));

                        renderQuestion();
                    });
                });

                prevBtn.disabled = (currentIndex === 0);
                nextBtn.innerText = (currentIndex === questions.length - 1) ? '完成' : '下一题';

                if (wrongSet.size > 0) {
                    wrongNote.innerText = `📌 你有 ${wrongSet.size} 道错题，继续加油！`;
                } else {
                    wrongNote.innerText = '';
                }
            }

            prevBtn.addEventListener('click', () => {
                if (currentIndex > 0) {
                    currentIndex--;
                    localStorage.setItem('currentIndex', currentIndex);
                    renderQuestion();
                }
            });

            nextBtn.addEventListener('click', () => {
                if (currentIndex < questions.length - 1) {
                    currentIndex++;
                    localStorage.setItem('currentIndex', currentIndex);
                    renderQuestion();
                } else {
                    alert('恭喜你完成所有题目！错题已记录，重新打开可继续练习。');
                }
            });

            // 初始渲染
            renderQuestion();
        })();
